apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservices-app
  namespace: argocd
spec:
  project: default   # ✅ ADD THIS LINE

  source:
    repoURL: https://github.com/agrocd_helm/repo.git
    targetRevision: HEAD
    path: microservices

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
