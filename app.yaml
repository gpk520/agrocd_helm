apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservices-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/<your-username>/repo.git
    targetRevision: HEAD
    path: microservices

    # ✅ THIS IS CRITICAL
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
